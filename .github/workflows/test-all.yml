name: Test All (Regression Detection)

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: test (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-24.04-arm is free for public repos and runs real NEON, so the
        # aarch64 SIMD path is actually built + executed here (the issue_72_*
        # NEON tests are #[cfg(target_arch = "aarch64")] and never ran on x86).
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run all tests
        run: cargo test --all --verbose

      - name: Run doc tests
        run: cargo test --doc --verbose

      - name: Install llvm (llvm-objdump for the SIMD assertion)
        run: sudo apt-get update && sudo apt-get install -y llvm

      - name: Assert diagonal fill is real SIMD (NEON on arm, SSE/AVX on x86)
        run: bash scripts/assert_simd.sh

      - name: Perf gate (SIMD measurably faster than naive >= 500bp)
        run: RUSTFLAGS="-C target-cpu=native" cargo test --release --test wfa_perf -- --ignored --nocapture
