name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cfsan-biostatistics/phraya

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux-portable
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-feature=+sse4.2"
            tarball_suffix: x86_64-linux-gnu-portable

          - name: x86_64-linux-native
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v3"
            tarball_suffix: x86_64-linux-gnu-native

          - name: aarch64-linux
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rustflags: ""
            tarball_suffix: aarch64-linux-gnu

          - name: x86_64-darwin
            runner: macos-13
            target: x86_64-apple-darwin
            rustflags: "-C target-cpu=x86-64-v3"
            tarball_suffix: x86_64-darwin

          - name: aarch64-darwin
            runner: macos-14
            target: aarch64-apple-darwin
            rustflags: ""
            tarball_suffix: aarch64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} -p phraya-cli

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=target/${{ matrix.target }}/release/phraya
          TARBALL=phraya-${VERSION}-${{ matrix.tarball_suffix }}.tar.gz
          cp "${BINARY}" phraya
          tar czf "${TARBALL}" phraya
          rm phraya
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.TARBALL }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.tar.gz
          generate_release_notes: true
          body: |
            ## Prebuilt Binaries

            Choose the right binary for your platform:

            | Tarball | OS | Arch | SIMD | Notes |
            |---------|----|------|------|-------|
            | `phraya-*-x86_64-linux-gnu-portable.tar.gz` | Linux | x86_64 | SSE4.2 | Runs on any x86_64 Linux (≥2008 CPUs) |
            | `phraya-*-x86_64-linux-gnu-native.tar.gz` | Linux | x86_64 | AVX2 | Best x86_64 performance (≥2013 CPUs) |
            | `phraya-*-aarch64-linux-gnu.tar.gz` | Linux | ARM64 | NEON | AWS Graviton, ARM servers |
            | `phraya-*-x86_64-darwin.tar.gz` | macOS | Intel | AVX2 | Intel Mac |
            | `phraya-*-aarch64-darwin.tar.gz` | macOS | Apple Silicon | NEON | M1/M2/M3/M4 Mac |

            ### Portable vs Native (x86_64 Linux)

            The **native** build uses AVX2 (`-C target-cpu=x86-64-v3`) and is ~2× faster for k-mer
            sketching via the simd-minimizers AVX2 path. Use it on any x86_64 machine from ~2013 onward
            (Intel Haswell / AMD Excavator or newer). If the native binary crashes with `Illegal instruction`,
            fall back to the **portable** build (SSE4.2 baseline, supported by every x86_64 CPU since ~2008).

            ARM builds (both Linux and Apple Silicon) always use NEON — there is no portable/native split
            because NEON is mandatory on AArch64.

            ### Quick install (Linux x86_64 native example)

            ```bash
            tar xzf phraya-*-x86_64-linux-gnu-native.tar.gz
            ./phraya --version
            ```

  build-and-push-docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version components
        id: version
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION=${TAG#v}
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:v${{ steps.version.outputs.major_minor }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
