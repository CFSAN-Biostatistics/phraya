name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cfsan-biostatistics/phraya

jobs:
  # ── Build binaries for all 5 targets ─────────────────────────────────────
  build-binaries:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: portable
            rustflags: ""
            artifact: phraya-linux-x86_64-portable
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            variant: native
            rustflags: "-C target-cpu=x86-64-v3"
            artifact: phraya-linux-x86_64-native
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            variant: neon
            rustflags: ""
            artifact: phraya-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-13
            variant: native
            rustflags: "-C target-cpu=native"
            artifact: phraya-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            variant: neon
            rustflags: ""
            artifact: phraya-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.variant }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --bin phraya --target ${{ matrix.target }}

      - name: Package binary
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE=phraya-${VERSION}-${{ matrix.artifact }}.tar.gz
          cp target/${{ matrix.target }}/release/phraya phraya
          tar czf "${ARCHIVE}" phraya
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ARCHIVE }}

  # ── Create GitHub Release and upload all binaries ────────────────────────
  github-release:
    name: GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name "*.tar.gz" -exec sha256sum {} \; | sed 's|./[^/]*/||' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME}
          # Extract section for this version from CHANGELOG.md
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            awk "/## \[${VERSION}\]/,/## \[v/" CHANGELOG.md | head -n -2 > release_notes.md
          else
            echo "Release ${VERSION}" > release_notes.md
            echo "" >> release_notes.md
            echo "See [CHANGELOG.md](CHANGELOG.md) for details." >> release_notes.md
          fi
          echo "## Binary notes" >> release_notes.md
          echo "" >> release_notes.md
          echo "| File | Platform | SIMD |" >> release_notes.md
          echo "|------|----------|------|" >> release_notes.md
          echo "| \`phraya-${VERSION}-phraya-linux-x86_64-portable.tar.gz\` | Linux x86_64 | SSE4.2 (portable) |" >> release_notes.md
          echo "| \`phraya-${VERSION}-phraya-linux-x86_64-native.tar.gz\` | Linux x86_64 | AVX2 (native, ~2× faster) |" >> release_notes.md
          echo "| \`phraya-${VERSION}-phraya-linux-aarch64.tar.gz\` | Linux ARM64 | NEON |" >> release_notes.md
          echo "| \`phraya-${VERSION}-phraya-macos-x86_64.tar.gz\` | macOS Intel | AVX2 |" >> release_notes.md
          echo "| \`phraya-${VERSION}-phraya-macos-aarch64.tar.gz\` | macOS Apple Silicon | NEON |" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/**/*.tar.gz
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

  # ── Docker multi-arch build and push ─────────────────────────────────────
  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish to crates.io ─────────────────────────────────────────────────
  crates-io:
    name: crates.io publish
    runs-on: ubuntu-latest
    # Only publish stable releases (not pre-releases)
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish phraya-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-core

      - name: Wait for phraya-core to be available
        run: sleep 30

      - name: Publish phraya-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-io

      - name: Publish phraya-align
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-align

      - name: Wait for dependencies to be available
        run: sleep 30

      - name: Publish phraya-filter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-filter

      - name: Publish phraya-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-cli
