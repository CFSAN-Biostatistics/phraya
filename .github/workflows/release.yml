name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-portable:
    name: Build Linux x86_64 portable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build portable binary (SSE4.2 baseline)
        env:
          RUSTFLAGS: "-C target-feature=+sse4.2"
        run: cargo build --release --package phraya-cli --target x86_64-unknown-linux-gnu

      - name: Strip binary
        run: strip target/x86_64-unknown-linux-gnu/release/phraya

      - name: Create tarball
        run: |
          VERSION="${{ github.ref_name }}"
          TARBALL="phraya-${VERSION}-x86_64-linux-gnu-portable.tar.gz"
          tar -czf "${TARBALL}" -C target/x86_64-unknown-linux-gnu/release phraya
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.TARBALL }}
