name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: cfsan-biostatistics/phraya

jobs:
  build:
    name: build (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64-linux-portable
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-feature=+sse4.2"
            tarball_suffix: x86_64-linux-gnu-portable

          - name: x86_64-linux-native
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rustflags: "-C target-cpu=x86-64-v3"
            tarball_suffix: x86_64-linux-gnu-native

          - name: aarch64-linux
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            rustflags: ""
            tarball_suffix: aarch64-linux-gnu

          - name: x86_64-darwin
            runner: macos-13
            target: x86_64-apple-darwin
            rustflags: "-C target-cpu=x86-64-v3"
            tarball_suffix: x86_64-darwin

          - name: aarch64-darwin
            runner: macos-14
            target: aarch64-apple-darwin
            rustflags: ""
            tarball_suffix: aarch64-darwin

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ runner.arch }}-${{ matrix.name }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        env:
          RUSTFLAGS: ${{ matrix.rustflags }}
        run: cargo build --release --target ${{ matrix.target }} -p phraya

      - name: Package
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          BINARY=target/${{ matrix.target }}/release/phraya
          TARBALL=phraya-${VERSION}-${{ matrix.tarball_suffix }}.tar.gz
          cp "${BINARY}" phraya
          tar czf "${TARBALL}" phraya
          rm phraya
          echo "TARBALL=${TARBALL}" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.TARBALL }}

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME}
          if grep -q "## \[${VERSION}\]" CHANGELOG.md 2>/dev/null; then
            awk "/## \[${VERSION}\]/,/## \[v/" CHANGELOG.md | head -n -2 > release_notes.md
          else
            printf "Release %s\n\nSee [CHANGELOG.md](CHANGELOG.md) for details.\n" "${VERSION}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}

  docker:
    name: Docker (multi-arch)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  crates-io:
    name: crates.io publish
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-alpha') && !contains(github.ref_name, '-beta') }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('**/Cargo.lock') }}

      - name: Publish phraya-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-core

      - name: Wait for phraya-core to propagate
        run: sleep 30

      - name: Publish phraya-align
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-align

      - name: Publish phraya-io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-io

      - name: Wait for dependencies to propagate
        run: sleep 30

      - name: Publish phraya-filter
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya-filter

      - name: Wait for phraya-filter to propagate
        run: sleep 30

      - name: Publish phraya
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p phraya
